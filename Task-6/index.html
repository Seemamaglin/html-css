<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabbed Interface</title>
</head>
<body>
    <div class="tabs">
        <input type="radio" name="tabs" id="tab1" checked>
        <input type="radio" name="tabs" id="tab2">
        <input type="radio" name="tabs" id="tab3">

    <div class="tab-labels">
        <label for="tab1">Overview</label>
        <label for="tab2">Places</label>
        <label for="tab3">Contact</label>
    </div>

    <div class="tab-content">
    <div class="content" id="content1">
        <h3>About Tamil Nadu Tourism</h3>
        <p>Tamil Nadu is known for its rich cultural heritage, ancient temples,
        scenic beaches, and hill stations.</p>
    </div>

    <div class="content" id="content2">
        <h3>Popular Tourist Places</h3>
        <ul>
        <li>Ooty</li>
        <li>Mahabalipuram</li>
        <li>Thanjavur</li>
        <li>Kodaikanal</li>
        </ul>
    </div>

    <div class="content" id="content3">
        <h3>Contact Information</h3>
        <p>Email: tourism@tamilnadu.gov.in</p>
        <p>Phone: 04171 241638</p>
    </div>
    </div>
        </div>
</body>
</html>
