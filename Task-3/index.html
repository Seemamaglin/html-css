<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section class="hobbies">
            <h2>My Hobbies</h2>
            <div class="grid-container">
                <div class="grid-item">Reading books</div>
                <div class="grid-item">Travelling</div>
                <div class="grid-item">Cooking</div>
                <div class="grid-item">pencil drawing</div>
                <div class="grid-item">Crochet</div>
                <div class="grid-item">Playing badminton</div>
                <div class="grid-item">Gardening</div>
                <div class="grid-item">Dancing</div>
            </div>
        </section>
    </main>
</body>
</html>
