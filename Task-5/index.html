<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>popup window</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <input type="checkbox" id="popup-toggle">
    <label for="popup-toggle" class="open-popup">Open </label>
    <div class="popup">
        <div class="popup-content">
            <h2>Simple popup window</h2>
            <p>This is a simple popup window built using only HTML and CSS and not JS</p>
            <label for="popup-toggle" class="close-popup">Close</label>
        </div>
    </div>
</body>
