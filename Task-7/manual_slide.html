<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="manual_slider.css">
</head>
<body>
    <div class="slider-container">
        <div class="slide-wrapper">
            <div class="slide" id="slide1">
                <img src="https://plus.unsplash.com/premium_photo-1673292293042-cafd9c8a3ab3?w=500&auto=format&fit=crop&q=60" alt="Nature view">
            </div>
            <div class="slide" id="slide2">
                <img src="https://images.unsplash.com/photo-1472396961693-142e6e269027?w=500&auto=format&fit=crop&q=60" alt="Mountain view">
            </div>
            <div class="slide" id="slide3">
                <img src="https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=500&auto=format&fit=crop&q=60" alt="Waterfall view">
            </div>
            <div class="slide" id="slide4">
                <img src="https://images.unsplash.com/photo-1505142468610-359e7d316be0?w=500&auto=format&fit=crop&q=60" alt="Beach view">
            </div>
        </div>
    </div>

        <div class="slider-nav">
            <a href="#slide1" class="dot"></a>
            <a href="#slide2" class="dot"></a>
            <a href="#slide3" class="dot"></a>
            <a href="#slide4" class="dot"></a>
        </div>
    
</body>
</html>
